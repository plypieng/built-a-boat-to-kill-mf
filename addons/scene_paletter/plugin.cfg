[plugin]
name="Scene Paletter"
description="A Godot editor plugin that provides a palette-based workflow for rapidly placing frequently-used scenes into your levels."
author="Flopper907"
version="0.1.1"
script="Plugin.cs"

[page]
pages={
	"PalettePage": "uid://ckjhkwikitst",
	"PlacingPage": "uid://xjihbdk14gmd",
	"EditingPage": "uid://75ootmri50th",
	"DeleteDialog": "uid://bgiqhjxdjrsv7",
	"StartToolDialog": "uid://cg7bjadc2wcpl"
}
widgets={
	"PaletteListItem": "uid://bm4rn73dw0n6t",
	"PlacingListItem": "uid://c2pgo5wkq2ofi",
	"EditingListItem": "uid://b7xsoqvo3anmq"
}
initial_docks={
	"RightDockTopLeft": "PalettePage",
	"Editor2DToolBar": "StartToolDialog",
	"Editor3DToolBar": "StartToolDialog"
}

[file]
widget_path="res://addons/scene_paletter/Widgets/"
palette_path="res://addons/scene_paletter/Palettes/"
file_extension=".json"
id_start=100000000
id_end=999999999

[ui]
min_columns=1
max_columns=4
columns=2
preview_resolution_x=256
preview_resolution_y=256
preview_margin_x=1.05
preview_margin_y=1.05
preview_2d_transparent=true
preview_3d_transparent=false
